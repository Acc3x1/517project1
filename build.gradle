plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group = 'com.iso11820'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

// 确保 Java 编译器使用 UTF-8 编码（中文注释需要）
compileJava {
    options.encoding = 'UTF-8'
}

compileTestJava {
    options.encoding = 'UTF-8'
}

javafx {
    version = '17.0.2'
    modules = ['javafx.controls', 'javafx.fxml', 'javafx.graphics']
}

repositories {
    mavenCentral()
}

dependencies {
    // SQLite
    implementation 'org.xerial:sqlite-jdbc:3.42.0.0'

    // JSON配置
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.15.2'

    // Excel导出
    implementation 'org.apache.poi:poi:5.2.3'
    implementation 'org.apache.poi:poi-ooxml:5.2.3'

    // PDF导出
    implementation 'org.apache.pdfbox:pdfbox:2.0.29'

    // 日志
    implementation 'org.slf4j:slf4j-api:2.0.7'
    implementation 'ch.qos.logback:logback-classic:1.4.8'

    // 数学计算(温漂)
    implementation 'org.apache.commons:commons-math3:3.6.1'
}

application {
    mainClass = 'com.iso11820.Launcher'
}

// run 任务的 JVM 参数 - 确保 JavaFX 模块正确加载
run {
    // JavaFX 需要开放反射访问
    jvmArgs = [
        '--add-opens', 'javafx.graphics/com.sun.javafx.css=ALL-UNNAMED',
        '--add-opens', 'javafx.controls/com.sun.javafx.scene.control.skin=ALL-UNNAMED',
        '--add-exports', 'javafx.graphics/com.sun.glass.ui=ALL-UNNAMED'
    ]
}

jar {
    manifest {
        attributes 'Main-Class': 'com.iso11820.Launcher'
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    // 排除 JavaFX 的模块描述文件，避免冲突
    exclude 'module-info.class'
    exclude 'META-INF/versions/*/module-info.class'
}
